# ── Uygulama ──────────────────────────────────────
spring.application.name=kurban-sistemi

# ── Veritabanı (local: H2, prod: PostgreSQL) ──────
# H2 (geliştirme)
spring.datasource.url=jdbc:h2:mem:kurbandb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL (production) — aşağıdaki satırları aktif et
# spring.datasource.url=jdbc:postgresql://localhost:5432/kurbandb
# spring.datasource.username=postgres
# spring.datasource.password=sifre
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────
spring.flyway.enabled=false

# ── Sıra ayarları ─────────────────────────────────
queue.noshow-timeout-minutes=15
queue.default-station-count=2

# ── SMS (şimdilik log, prod'da Netgsm) ────────────
sms.enabled=false
sms.provider=netgsm
sms.netgsm.usercode=
sms.netgsm.password=
sms.netgsm.msgheader=KURBAN

# ── CORS ──────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000
