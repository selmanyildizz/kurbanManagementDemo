# ── Uygulama ──────────────────────────────────────
spring.application.name=kurban-sistemi

# ── Veritabanı (PostgreSQL) ────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kurbandb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────
spring.flyway.enabled=true

# ── JWT ───────────────────────────────────────────
jwt.secret=${JWT_SECRET:dev-only-insecure-secret-change-me-in-production}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:720}

# ── İlk admin hesabı bootstrap (opsiyonel, sadece staff_user tablosu boşsa) ──
admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}

# ── Sıra ayarları ─────────────────────────────────
queue.noshow-timeout-minutes=${NOSHOW_TIMEOUT_MINUTES:15}
queue.default-station-count=2

# ── SMS (şimdilik log, prod'da Netgsm) ────────────
sms.enabled=${SMS_ENABLED:false}
sms.provider=netgsm
sms.netgsm.usercode=${NETGSM_USERCODE:}
sms.netgsm.password=${NETGSM_PASSWORD:}
sms.netgsm.msgheader=${NETGSM_MSGHEADER:KURBAN}

# ── E-posta bildirimleri (SMTP, örn. Brevo) ───────
email.enabled=${EMAIL_ENABLED:false}
email.from=${EMAIL_FROM:}
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:true}
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000

# ── CORS ──────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
